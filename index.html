<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hamyunguu — photography</title>
<link rel="stylesheet" href="https://use.typekit.net/cfd7hxi.css">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:    #ffffff;
  --text:  #000000;
  --muted: #777777;
  --sans:  'adobe-aldine-variable', Georgia, serif;
  --nav-h: 52px;
  --pad:   48px;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 200;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  cursor: none;
}
*, *::before, *::after { cursor: none !important; }
#custom-cursor {
  position: fixed;
  width: 13px;
  height: 13px;
  border: 0.5px solid #111;
  background: white;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%, -50%);
  transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease, opacity 0.15s ease;
  will-change: left, top;
  opacity: 0;
}
#custom-cursor.visible { opacity: 1; }
#custom-cursor.is-hover {
  background: #111;
  transform: translate(-50%, -50%) scale(0.9);
}

/* ── NAV ── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--pad);
  z-index: 100;
}

.logo {
  font-size: 13px;
  font-weight: 200;
  letter-spacing: 0.06em;
  color: var(--text);
  background: none; border: none;
  cursor: pointer; padding: 0;
  font-family: var(--sans);
}

.nav-links { display: flex; gap: 28px; align-items: center; }

.nav-link {
  font-size: 11px;
  font-weight: 200;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  background: none; border: none;
  cursor: pointer; padding: 0;
  font-family: var(--sans);
  transition: color 0.15s;
}
.nav-link:hover { color: var(--text); }
.nav-link.active { color: var(--text); }

/* ── WORKS DROPDOWN ── */
.nav-item {
  position: relative;
  display: flex;
  align-items: center;
}
.nav-item::after {
  content: '';
  position: absolute;
  top: 100%;
  left: -12px;
  right: -12px;
  height: 20px;
}

.nav-dropdown {
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg);
  display: flex;
  flex-direction: column;
  gap: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
  white-space: nowrap;
  min-width: 80px;
  padding-top: 8px;
}
.nav-item:hover .nav-dropdown,
.nav-item.open .nav-dropdown {
  opacity: 1;
  pointer-events: auto;
}

.nav-dropdown-item {
  font-size: 11px;
  font-weight: 200;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--muted);
  background: none; border: none;
  cursor: pointer; padding: 7px 0;
  font-family: var(--sans);
  transition: color 0.15s;
  text-align: center;
  text-decoration: none;
  display: block;
}
.nav-dropdown-item:hover { color: var(--text); }

/* ── PAGES ── */
.page {
  display: none;
  flex-direction: column;
  padding-top: var(--nav-h);
  min-height: 100vh;
  animation: fadeIn 0.28s ease both;
}
.page.visible { display: flex; }

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes fadeOut {
  from { opacity: 1; }
  to   { opacity: 0; }
}

/* ── HOME HERO ── */
.hero-split {
  display: grid;
  grid-template-columns: 3fr 2fr;
  grid-template-rows: 1fr 1.5fr;
  gap: 3px;
  height: calc(88vh - var(--nav-h));
  padding: 16px var(--pad) 0;
}

.hero-panel {
  position: relative;
  overflow: hidden;
  cursor: pointer;
  background: #e8e8e8;
}
.hero-panel-main { grid-row: 1 / 3; }

.hero-img-fill {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: var(--pos, 50% 50%);
  transition: opacity 0.2s;
}
.hero-panel:hover .hero-img-fill { opacity: 0.88; }

/* ── HOME RECENT ── */
.home-recent { padding: 48px var(--pad) 0; }

.section-label {
  font-size: 10px;
  font-weight: 200;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  display: block;
  margin-bottom: 18px;
}

.recent-slider {
  display: flex;
  gap: 3px;
  overflow-x: auto;
  scrollbar-width: none;
  scroll-snap-type: x mandatory;
  cursor: grab;
  -webkit-overflow-scrolling: touch;
}
.recent-slider.grabbing { cursor: grabbing; }
.recent-slider::-webkit-scrollbar { display: none; }

.recent-card {
  flex: 0 0 calc((100% - 12px) / 5);
  cursor: pointer;
  scroll-snap-align: start;
  min-width: 0;
}

.recent-thumb {
  aspect-ratio: 3/4;
  margin-bottom: 10px;
  overflow: hidden;
  background: #e8e8e8;
}
.recent-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: var(--pos, 50% 50%);
  display: block;
  transition: opacity 0.2s;
}
.recent-card:hover .recent-thumb img { opacity: 0.82; }

.recent-title {
  font-size: 10px;
  font-weight: 200;
  color: var(--text);
  margin-bottom: 3px;
  letter-spacing: 0.03em;
}
.recent-meta {
  font-size: 10px;
  font-weight: 200;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ── WORKS FEED ── */
.works-page-header {
  padding: 44px var(--pad) 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.works-heading {
  font-size: 10px;
  font-weight: 200;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}
.filter-row { display: flex; gap: 20px; }
.filter-btn {
  font-size: 10px;
  font-weight: 200;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--muted);
  background: none; border: none;
  cursor: pointer; padding: 0;
  font-family: var(--sans);
  transition: color 0.15s;
}
.filter-btn:hover, .filter-btn.active { color: var(--text); }

.feed {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px;
  padding: 0 15%;
}

.feed-meta-l, .feed-meta-r { display: none; }
.feed-num {
  font-size: 14px;
  font-weight: 200;
  color: var(--muted);
}
.feed-center {
  display: flex;
  flex-direction: column;
}
.feed-name {
  font-size: 14px;
  font-weight: 200;
  color: var(--muted);
  letter-spacing: 0.06em;
}
.feed-caption {
  display: none;
  font-size: 10px;
  font-weight: 200;
  color: #555;
  padding: 8px 0 24px;
  letter-spacing: 0.01em;
}
.feed-cat {
  font-size: 14px;
  font-weight: 200;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.feed-img {
  cursor: pointer;
  overflow: hidden;
  display: block;
}
.feed-img img {
  display: block;
  width: 100%;
  height: auto;
  transition: opacity 0.2s;
}
.feed-img:hover img { opacity: 0.88; }

.feed-row { display: contents; }
.feed-row.hidden { display: none; }

/* ── PROJECT DETAIL ── */
.breadcrumb {
  position: absolute;
  top: 0;
  left: var(--pad);
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: flex-start;
}
.breadcrumb span, .breadcrumb button {
  font-size: 10px;
  font-weight: 200;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--muted);
  background: none; border: none;
  cursor: pointer; padding: 0;
  font-family: var(--sans);
  transition: color 0.15s;
}
.breadcrumb button:hover { color: var(--text); }


.proj-layout {
  display: grid;
  grid-template-columns: 1fr minmax(0, 560px) 1fr;
  padding-top: 22px;
}
.proj-meta-l {
  grid-column: 1;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  padding: 0 24px 0 var(--pad);
}
.proj-meta-r {
  grid-column: 3;
  align-self: start;
  display: flex;
  flex-direction: column;
  padding: 0 var(--pad) 0 72px;
}
.proj-cat-label {
  font-size: 10px;
  font-weight: 200;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 9px;
}
.proj-name {
  font-size: 22px;
  font-weight: 200;
  color: var(--text);
  line-height: 1.2;
}
.proj-credit {
  font-size: 10px;
  font-weight: 200;
  color: var(--muted);
  text-align: right;
  letter-spacing: 0.04em;
}

/* GALLERY */
.gallery {
  grid-column: 2;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.g-full-wrap, .g-multi-wrap { width: 100%; }
.g-img {
  display: block;
  width: 100%; height: auto;
}
.g-2col-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px;
}
.g-3col-inner {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 3px;
}
.g-col .g-img { width: 100%; height: auto; }

.proj-nav-bar {
  padding: 28px var(--pad);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.pnav-back {
  font-size: 10px;
  font-weight: 200;
  color: var(--muted);
  background: none; border: none;
  cursor: pointer; padding: 0;
  font-family: var(--sans);
  letter-spacing: 0.09em;
  text-transform: uppercase;
  transition: color 0.15s;
}
.pnav-back:hover { color: var(--text); }
.pnav-next {
  font-size: 10px;
  font-weight: 200;
  color: var(--muted);
  cursor: pointer;
  text-align: right;
  letter-spacing: 0.03em;
  transition: color 0.15s;
}
.pnav-next:hover { color: var(--text); }

/* ── ABOUT OVERLAY ── */
.about-overlay {
  display: flex;
  position: fixed;
  inset: 0;
  background: rgba(255, 255, 255, 0.88);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 200;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  padding: var(--nav-h) var(--pad) 48px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.28s ease;
}
.about-overlay.visible {
  opacity: 1;
  pointer-events: auto;
}

.about-wrap {
  width: 100%;
  max-width: 480px;
  cursor: default;
}
.about-content { padding: 0; }
.about-photo {
  width: 150px;
  aspect-ratio: 3/4;
  background: #e8e8e8;
  margin-bottom: 32px;
  overflow: hidden;
}
.about-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
.about-name {
  font-size: 18px;
  font-weight: 200;
  color: var(--text);
  margin-bottom: 6px;
  letter-spacing: 0.02em;
}
.about-role {
  font-size: 11px;
  font-weight: 200;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 36px;
}
.about-bio {
  font-size: 14px;
  font-weight: 200;
  color: var(--text);
  line-height: 1.9;
  margin-bottom: 14px;
}
.about-bio-sub {
  font-size: 11px;
  font-weight: 200;
  color: var(--muted);
  line-height: 1.9;
  margin-bottom: 36px;
}
.contact-line {
  display: block;
  font-size: 13px;
  font-weight: 200;
  color: var(--muted);
  text-decoration: none;
  line-height: 2.2;
  transition: color 0.15s;
}
.contact-line:hover { color: var(--text); }

.about-contact-label, .list-label {
  font-size: 7.5px;
  font-weight: 200;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.about-contact-link {
  font-size: 11px;
  font-weight: 200;
  color: var(--text);
  margin-bottom: 40px;
}
.collab-list { list-style: none; margin-bottom: 36px; }
.collab-item {
  padding: 10px 0;
  font-size: 11px;
  font-weight: 200;
  color: var(--text);
}
.avail-list { list-style: none; }
.avail-item {
  font-size: 11px;
  font-weight: 200;
  color: var(--muted);
  line-height: 2.2;
}

/* ── WORKS STRIP ── */
.strip-container {
  display: flex;
  gap: 3px;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 32px 0 0;
  align-items: flex-start;
  -webkit-overflow-scrolling: touch;
  user-select: none;
}

.strip-container::-webkit-scrollbar { display: none; }

.strip-card {
  flex: 0 0 auto;
  cursor: pointer;
  transition: opacity 0.4s ease, filter 0.4s ease;
}
.strip-thumb {
  height: 42vh;
  overflow: hidden;
}
.strip-thumb img {
  display: block;
  height: 100%;
  width: auto;
  pointer-events: none;
}
.strip-card-name {
  font-size: 11px;
  font-weight: 200;
  color: #555;
  padding: 8px 0 0;
  letter-spacing: 0.01em;
}
.strip-card.dimmed {
  opacity: 0.12;
  filter: blur(2px);
  pointer-events: none;
}

/* ── WORKS INLINE DETAIL ── */
.works-detail {
  display: none;
  padding-top: 48px;
}
.works-detail.animating {
  animation: detailSlideIn 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
}
@keyframes detailSlideIn {
  from { opacity: 0; transform: translateY(-16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.works-detail-grid {
  display: grid;
  grid-template-columns: 1fr minmax(0, 560px) 1fr;
  row-gap: 3px;
}
.wd-full { grid-column: 2; }
.wd-full img { display: block; width: 100%; height: auto; }
.wd-multi { grid-column: 2; }
.wd-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
.wd-3col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px; }
.wd-col img { display: block; width: 100%; height: auto; }

.wd-close {
  grid-column: 2;
  padding: 28px 0 0;
  font-size: 8px;
  font-weight: 200;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  background: none; border: none;
  font-family: var(--sans);
  transition: color 0.15s;
  text-align: left;
}
.wd-close:hover { color: var(--text); }

/* ── FOOTER ── */
footer {
  margin-top: auto;
  padding: 28px var(--pad);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
footer p {
  font-size: 9.5px;
  font-weight: 200;
  color: var(--muted);
  letter-spacing: 0.06em;
}

/* ── PAGE LOADER ── */
#page-loader {
  display: none;
  position: fixed;
  inset: 0;
  background: #fff;
  z-index: 500;
  align-items: center;
  justify-content: center;
}
#page-loader.active { display: flex; }

#loader-canvas {
  width: 22px;
  height: 22px;
}
#loader-expand {
  display: none;
}

/* ── LIGHTBOX ── */
#lightbox {
  display: flex;
  position: fixed;
  inset: 0;
  background: #fff;
  z-index: 800;
  align-items: center;
  justify-content: center;
  cursor: default;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}
#lightbox.active {
  opacity: 1;
  pointer-events: auto;
}
#lightbox img {
  max-width: 90vw;
  max-height: 90vh;
  width: auto;
  height: auto;
  object-fit: contain;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s ease;
}
#lightbox.active img {
  opacity: 1;
  transition: opacity 0.5s ease 0.3s;
}
.wd-full img, .wd-col img, .g-img { cursor: default; }

/* ── UTILS ── */
.hidden { display: none !important; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  :root { --pad: 20px; --nav-h: 48px; }

  /* cursor: touch에서 숨김 */
  #custom-cursor { display: none !important; }
  *, *::before, *::after { cursor: auto !important; }

  /* nav */

  /* feed */
  .feed { display: block; padding: 0; }
  .feed-row { display: block; }
  .feed-meta-l, .feed-meta-r { display: none !important; }
  .feed-center { display: flex; flex-direction: column; width: 100%; }
  .feed-caption { display: block; padding: 8px 16px 0; }

  /* nav dropdown: hover sticky 제거, open 클래스만 사용 */
  .nav-item:hover .nav-dropdown { opacity: 0; pointer-events: none; }
  .nav-item.open .nav-dropdown  { opacity: 1; pointer-events: auto; }

  /* works strip */
  .strip-thumb { height: 52vw; }
  .strip-card-name { font-size: 10px; padding-top: 6px; }
  .works-page-header { flex-direction: column; gap: 12px; align-items: flex-start; padding: 28px var(--pad) 18px; }

  /* works detail */
  .works-detail-grid { grid-template-columns: 1fr; padding: 0 var(--pad); }
  .wd-full, .wd-multi { grid-column: 1; }
  .wd-2col { grid-template-columns: 1fr 1fr; }
  .wd-3col { grid-template-columns: 1fr 1fr; gap: 3px; }

  /* project gallery */
  .gallery { grid-template-columns: 1fr; padding: 0 var(--pad); }
  .g-full-wrap, .g-multi-wrap { grid-column: 1; }
  .g-2col-inner { grid-template-columns: 1fr 1fr; }
  .g-3col-inner { grid-template-columns: 1fr 1fr; }

  .proj-layout { grid-template-columns: 1fr; padding: 20px var(--pad) 0; }
  .proj-meta-l { grid-column: 1; align-items: flex-start; padding: 0 0 16px; }
  .proj-meta-r { grid-column: 1; padding: 16px 0 0; }
  .proj-credit { text-align: left; }
  .gallery { grid-column: 1; }
  .proj-name { font-size: 18px; }
  .proj-nav-bar { padding: 20px var(--pad); }

  /* lightbox */
  #lightbox img { max-width: 95vw; max-height: 82vh; }

  /* about/contact */
  .about-overlay { align-items: center; justify-content: center; padding: var(--nav-h) var(--pad) 48px; overflow-y: auto; }
  .about-wrap { max-width: 100%; }
  .about-bio { margin-bottom: 6px; }

  footer { flex-direction: column; gap: 4px; align-items: flex-start; }
}

</style>
</head>
<body>
<div id="custom-cursor"></div>

<!-- ── NAVIGATION ── -->
<nav>
  <button class="logo" onclick="showPage('home')">hamyunguu</button>
  <div class="nav-links">
    <button class="nav-link" id="nav-about" onclick="showPage('about')">About</button>
    <button class="nav-link" id="nav-contact" onclick="openContact()">Contact</button>
  </div>
</nav>

    <!-- Left col 1 -->
    <div class="feed-row"><div class="feed-meta-l"></div><div class="feed-center"><div class="feed-img" onclick="showProject('acc-objects')"><img src="2025.10 ACC_Left/DSC00121.jpg" loading="lazy" alt=""></div></div><div class="feed-meta-r"></div></div>

    <div class="feed-row"><div class="feed-meta-l"></div><div class="feed-center"><div class="feed-img" onclick="showProject('ddp')"><img src="2025.09 DDP_ Right/DSC02359.jpg" loading="lazy" alt=""></div></div><div class="feed-meta-r"></div></div>

    <!-- Left col 1 -->
    <div class="feed-row"><div class="feed-meta-l"></div><div class="feed-center"><div class="feed-img" onclick="showProject('twl')"><img src="2025.09 TWL_Left/DSC02310.jpg" loading="lazy" alt=""></div></div><div class="feed-meta-r"></div></div>
    <!-- Right col 2 -->
    <div class="feed-row"><div class="feed-meta-l"></div><div class="feed-center"><div class="feed-img" onclick="showProject('mmca')"><img src="2025.08 MMCA_Right/Hero 1.jpg" loading="lazy" alt=""></div></div><div class="feed-meta-r"></div></div>

    <!-- Left col 1 -->

function showPage(id) {
  if (id === 'about') {
    openAbout();
    return;
  }
  // Close overlays if open
  closeAbout();
  closeContact();
  document.querySelectorAll('.page').forEach(p => p.classList.remove('visible'));
  const el = document.getElementById('page-' + id);
  if (el) {
    el.classList.add('visible');
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = '';
  }
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function openContact() {
  closeAbout();
  const overlay = document.getElementById('contact-overlay');
  overlay.classList.add('visible');
  overlay.scrollTop = 0;
  document.getElementById('nav-contact').classList.add('active');
}

function closeContact() {
  const overlay = document.getElementById('contact-overlay');
  if (!overlay.classList.contains('visible')) return;
  overlay.classList.remove('visible');
  document.getElementById('nav-contact').classList.remove('active');
}

function openAbout() {
  const overlay = document.getElementById('about-overlay');
  overlay.classList.add('visible');
  overlay.scrollTop = 0;
  document.getElementById('nav-about').classList.add('active');
}

function closeAbout() {
  const overlay = document.getElementById('about-overlay');
  if (!overlay.classList.contains('visible')) return;
  overlay.classList.remove('visible');
  document.getElementById('nav-about').classList.remove('active');
}

function runLoader(callback) {
  const loader = document.getElementById('page-loader');
  loader.style.opacity   = '0';
  loader.style.transition = 'none';
  loader.classList.add('active');
  loader.offsetHeight; // reflow
  loader.style.transition = 'opacity 0.35s ease';
  loader.style.opacity   = '1';
  setTimeout(() => {
    callback();
    requestAnimationFrame(() => {
      loader.style.transition = 'opacity 0.5s ease';
      loader.style.opacity   = '0';
      setTimeout(() => {
        loader.classList.remove('active');
        loader.style.opacity   = '';
        loader.style.transition = '';
      }, 500);
    });
  }, 370);
}

function showProject(id) {
  const p = projects[id];
  if (!p) return;

  _homeScrollY = window.scrollY;
  runLoader(() => {
    document.getElementById('proj-breadcrumb').textContent = p.name;
    document.getElementById('proj-cat').textContent = p.cat;
    document.getElementById('proj-name').textContent = p.name;
    document.getElementById('proj-credit').innerHTML = p.credit.replace(/\n/g, '<br>');

    const gallery = document.getElementById('gallery-content');
    gallery.innerHTML = '';

    const gi = (src) => {
      const s = src.replace(/'/g, "\\'");
      return `<img src="${src}" class="g-img" loading="lazy" alt="" onclick="openLightbox('${s}')">`;
    };

    const heroes = heroImages[id] || [];
    if (heroes.length === 1) {
      gallery.innerHTML += `<div class="g-full-wrap">${gi(`${p.folder}/${heroes[0]}`)}</div>`;
    } else if (heroes.length === 2) {
      gallery.innerHTML += `<div class="g-multi-wrap"><div class="g-2col-inner"><div class="g-col">${gi(`${p.folder}/${heroes[0]}`)}</div><div class="g-col">${gi(`${p.folder}/${heroes[1]}`)}</div></div></div>`;
    } else if (heroes.length >= 3) {
      gallery.innerHTML += `<div class="g-multi-wrap"><div class="g-3col-inner"><div class="g-col">${gi(`${p.folder}/${heroes[0]}`)}</div><div class="g-col">${gi(`${p.folder}/${heroes[1]}`)}</div><div class="g-col">${gi(`${p.folder}/${heroes[2]}`)}</div></div></div>`;
    }

    p.layout.forEach(item => {
      if (item.type === 'full') {
        gallery.innerHTML += `<div class="g-full-wrap">${gi(`${p.folder}/${item.file}`)}</div>`;
      } else if (item.type === '2col') {
        gallery.innerHTML += `<div class="g-multi-wrap"><div class="g-2col-inner"><div class="g-col">${gi(`${p.folder}/${item.files[0]}`)}</div><div class="g-col">${gi(`${p.folder}/${item.files[1]}`)}</div></div></div>`;
      }
    });

    const nextEl = document.getElementById('proj-next');
    if (p.next) {
      nextEl.innerHTML = p.next.name + ' &rarr;';
      nextEl.onclick = () => showProject(p.next.id);
    } else {
      nextEl.innerHTML = '';
    }

    showPage('project');
  });
}

function showWorksCategory(cat) {
  currentWorksCat = cat;
  runLoader(() => showPage('works'));
}

function buildWorksStrip(cat) {
  expandedCardId = null;
  const container = document.getElementById('strip-container');
  const detail = document.getElementById('works-detail');
  container.innerHTML = '';
  detail.style.display = 'none';
  detail.innerHTML = '';

  const ids = projectOrder.filter(id => cat === 'all' || projectCats[id] === cat);
  if (!ids.length) return;

  let isDrag = false, dragStartX = 0, dragStartScroll = 0, dragged = false;

  function makeCard(id) {
    const p = projects[id];
    const heroes = heroImages[id] || [];
    const src = heroes.length ? `${p.folder}/${heroes[0]}` : '';
    const card = document.createElement('div');
    card.className = 'strip-card';
    card.dataset.id = id;
    card.innerHTML = `<div class="strip-thumb">${src ? `<img src="${src}" alt="" loading="lazy">` : ''}</div><p class="strip-card-name">${p.name}</p>`;
    card.addEventListener('click', (e) => {
      e.stopPropagation();
      if (dragged) return;
      toggleCardDetail(id, card);
    });
    return card;
  }

  ids.forEach(id => container.appendChild(makeCard(id)));

  // sentinel marks end of original set — offsetLeft updates live as images load
  const sentinel = document.createElement('div');
  sentinel.style.cssText = 'flex:0 0 0;width:0;height:1px;';
  container.appendChild(sentinel);

  // two clones so short categories always fill the viewport
  ids.forEach(id => container.appendChild(makeCard(id)));
  ids.forEach(id => container.appendChild(makeCard(id)));

  container.addEventListener('scroll', () => {
    if (expandedCardId) return;
    const origW = sentinel.offsetLeft;
    if (origW <= 0) return;
    if (container.scrollLeft >= origW * 2) container.scrollLeft -= origW;
    if (container.scrollLeft < origW)      container.scrollLeft += origW;
  }, { passive: true });

  // start in the middle clone so left-scroll also works
  requestAnimationFrame(() => {
    const origW = sentinel.offsetLeft;
    if (origW > 0) container.scrollLeft = origW;
  });

  container.addEventListener('mousedown', e => {
    isDrag = true; dragged = false;
    dragStartX = e.pageX;
    dragStartScroll = container.scrollLeft;
    e.preventDefault();
  });
  window.addEventListener('mouseup', () => { isDrag = false; });
  container.addEventListener('mousemove', e => {
    if (!isDrag) return;
    if (Math.abs(e.pageX - dragStartX) > 4) dragged = true;
    container.scrollLeft = dragStartScroll - (e.pageX - dragStartX);
  });
}

function smoothStripScroll(container, target, duration) {
  const start = container.scrollLeft;
  const dist = target - start;
  const t0 = performance.now();
  function ease(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }
  function step(now) {
    const p = Math.min((now - t0) / duration, 1);
    container.scrollLeft = start + dist * ease(p);
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function toggleCardDetail(id, el) {
  const container = document.getElementById('strip-container');
  const detail = document.getElementById('works-detail');

  if (expandedCardId === id) { closeCardDetail(); return; }

  expandedCardId = id;
  stripSavedScroll = container.scrollLeft;

  container.querySelectorAll('.strip-card').forEach(c => {
    c.classList.toggle('dimmed', c.dataset.id !== id);
  });

  smoothStripScroll(container, el.offsetLeft - container.offsetWidth / 2 + el.offsetWidth / 2, 820);

  const p = projects[id];
  const heroes = heroImages[id] || [];
  let html = '<div class="works-detail-grid">';

  const li = (src) => `<img src="${src}" loading="lazy" alt="" onclick="openLightbox('${src.replace(/'/g,"\\'")}')">`;
  if (heroes.length === 1) {
    html += `<div class="wd-full">${li(`${p.folder}/${heroes[0]}`)}</div>`;
  } else if (heroes.length === 2) {
    html += `<div class="wd-multi"><div class="wd-2col"><div class="wd-col">${li(`${p.folder}/${heroes[0]}`)}</div><div class="wd-col">${li(`${p.folder}/${heroes[1]}`)}</div></div></div>`;
  } else if (heroes.length >= 3) {
    html += `<div class="wd-multi"><div class="wd-3col"><div class="wd-col">${li(`${p.folder}/${heroes[0]}`)}</div><div class="wd-col">${li(`${p.folder}/${heroes[1]}`)}</div><div class="wd-col">${li(`${p.folder}/${heroes[2]}`)}</div></div></div>`;
  }

  p.layout.forEach(item => {
    if (item.type === 'full') {
      html += `<div class="wd-full${item.crop ? ' wd-crop' : ''}">${li(`${p.folder}/${item.file}`)}</div>`;
    } else if (item.type === '2col') {
      html += `<div class="wd-multi"><div class="wd-2col"><div class="wd-col">${li(`${p.folder}/${item.files[0]}`)}</div><div class="wd-col">${li(`${p.folder}/${item.files[1]}`)}</div></div></div>`;
    }
  });

  html += '</div>';
  detail.innerHTML = html;

  setTimeout(() => {
    detail.style.display = 'block';
    detail.classList.add('animating');
    detail.addEventListener('animationend', () => detail.classList.remove('animating'), { once: true });
    setTimeout(() => {
      const targetY = detail.getBoundingClientRect().top + window.scrollY - 16;
      smoothPageScroll(targetY, 900);
    }, 80);
  }, 840);
}

function closeCardDetail() {
  expandedCardId = null;
  const container = document.getElementById('strip-container');
  const detail = document.getElementById('works-detail');
  container.querySelectorAll('.strip-card').forEach(c => c.classList.remove('dimmed'));
  detail.style.pointerEvents = 'none';
  detail.style.transition = 'opacity 0.4s ease';
  detail.style.opacity = '0';

  const startY = window.scrollY;
  const duration = 500;
  const t0 = performance.now();
  (function step(ts) {
    const p = Math.min((ts - t0) / duration, 1);
    const e = p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p+2, 2)/2;
    window.scrollTo(0, startY * (1 - e));
    if (p < 1) requestAnimationFrame(step);
  })(performance.now());

  setTimeout(() => {
    detail.style.display = 'none';
    detail.style.transition = '';
    detail.style.pointerEvents = '';
    detail.style.opacity = '';
    detail.innerHTML = '';
  }, 650);
}

function smoothPageScroll(targetY, duration) {
  const start = window.scrollY;
  const dist = targetY - start;
  const t0 = performance.now();
  function step(now) {
    const p = Math.min((now - t0) / duration, 1);
    const e = p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p+2, 2)/2;
    window.scrollTo(0, start + dist * e);
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
let _lbJustClosed = false;
let _lbScrollY = 0;
let _homeScrollY = 0;
function openLightbox(src) {
  _lbScrollY = window.scrollY;
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');
  img.style.transition = '';
  img.style.opacity = '';
  img.src = src;
  lb.classList.add('active');
}
function closeLightbox() {
  _lbJustClosed = true;
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');
  img.style.transition = 'opacity 0.4s ease';
  img.style.opacity = '0';
  setTimeout(() => {
    lb.classList.remove('active');
    window.scrollTo({ top: _lbScrollY, behavior: 'instant' });
  }, 420);
  setTimeout(() => {
    img.src = '';
    img.style.transition = '';
    img.style.opacity = '';
    _lbJustClosed = false;
  }, 820);
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ─── SLIDER DRAG + AUTO-SLIDE ───
;(function() {
  const slider = document.getElementById('recent-slider');
  if (!slider) return;
  let isDragging = false, startX, scrollLeft, moved = false;

  slider.addEventListener('mousedown', e => {
    isDragging = true; moved = false;
    startX = e.pageX;
    scrollLeft = slider.scrollLeft;
    slider.classList.add('grabbing');
    e.preventDefault();
  });

  window.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    slider.classList.remove('grabbing');
  });

  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    moved = true;
    slider.scrollLeft = scrollLeft - (e.pageX - startX);
  });

  slider.addEventListener('click', e => {
    if (moved) { e.stopPropagation(); e.preventDefault(); }
  }, true);

  // auto-slide
  let paused = false;
  const tick = () => {
    if (paused) return;
    const card = slider.querySelector('.recent-card');
    if (!card) return;
    const step = card.offsetWidth + 12;
    const maxScroll = slider.scrollWidth - slider.clientWidth;
    if (slider.scrollLeft >= maxScroll - 2) {
      slider.scrollTo({ left: 0, behavior: 'smooth' });
    } else {
      slider.scrollBy({ left: step, behavior: 'smooth' });
    }
  };
  let timer = setInterval(tick, 3500);
  slider.addEventListener('mouseenter', () => { paused = true; });
  slider.addEventListener('mouseleave', () => { paused = false; });
})();

// ─── PROJECT PAGE: click outside image/buttons → back to home ───
document.getElementById('page-project').addEventListener('click', (e) => {
  if (_lbJustClosed) return;
  if (e.target.closest('img, button, a, .pnav-next, .proj-nav-bar, .breadcrumb')) return;
  runLoader(() => {
    showPage('home');
    requestAnimationFrame(() => window.scrollTo({ top: _homeScrollY, behavior: 'instant' }));
  });
});



// ─── CUSTOM CURSOR ───
;(function() {
  if ('ontouchstart' in window || navigator.maxTouchPoints > 0) return;
  const cur = document.getElementById('custom-cursor');
  const HOVER_SELECTORS = 'a, button, .feed-img, .feed-center, .strip-card, .works-card, .wd-full img, .wd-col img, .g-img, #lightbox, .about-overlay, #contact-overlay, .pnav-next, .pnav-back, [onclick]';

  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top  = e.clientY + 'px';
    cur.classList.add('visible');
  });

  document.addEventListener('mouseover', e => {
    if (e.target.closest(HOVER_SELECTORS)) cur.classList.add('is-hover');
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest(HOVER_SELECTORS)) cur.classList.remove('is-hover');
  });

  document.documentElement.addEventListener('mouseleave', () => {
    cur.classList.remove('is-hover');
    cur.classList.remove('visible');
  });
  document.documentElement.addEventListener('mouseenter', () => {
    cur.classList.add('visible');
  });
})();
